<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Dashboard</title>
  <link id="pageIcon" rel="icon" type="image/x-icon" href="https://asdk12.instructure.com/images/favicon.ico">
  <style>
    iframe {
      width: 100%;
      height: 500px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

  <h2>Enter URL in Search Bar</h2>
  <p>(some sites will not work, but most will)</p>
  
  <!-- Dropdown for icon and title -->
  <label for="themeSelector">Choose Theme:</label>
  <select id="themeSelector" onchange="changeTheme()">
    <option value="default">Canvas</option>
    <option value="clever">Clever</option>
    <option value="docs">Google Docs</option>
    <option value="slides">Google Slides</option>
    <option value="sheets">Google Sheets</option>
    <option value="drive">Google Drive</option>
    <option value="kami">Kami</option>
    <option value="iready">i-Ready</option>
    <option value="gizmo">Gizmo</option>
    <option value="codeorg">Code.org</option>
    <option value="typeag">Typing Agent</option>
    <option value="quill">Quill</option>
  </select>

  <br><br>

  <!-- Search Input Form -->
  <form id="urlForm" onsubmit="return openURLInIframe(event)">
    <input type="search" id="searchInput" placeholder="Enter URL" required>
    <button type="submit">Go</button>
  </form>

  <!-- Iframe to load the URL -->
  <iframe id="resultIframe" src="about:blank"></iframe>

  <script>
    // Function to handle the URL input and open it inside the iframe
    function openURLInIframe(event) {
      event.preventDefault(); // Prevent the form from refreshing the page

      const input = document.getElementById('searchInput');
      const iframe = document.getElementById('resultIframe');
      const url = input.value.trim();

      const customURLs = {
        "games.org": "https://rocketsoccerderby.gitlab.io/",
        "unblock-it.com": "https://cloud.global.ssl.fastly.net"
      };

      // Check if the URL is in the customURLs object
      if (customURLs[url]) {
        iframe.src = customURLs[url];
      } else {
        // Validate if the URL starts with 'http://' or 'https://'
        iframe.src = url.startsWith('http://') || url.startsWith('https://') ? url : "https://" + url;
      }

      input.value = ''; // Clear the input field after submission
    }
