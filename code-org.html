    iframe {
      width: 100%;
      height: 500px;
      border: 1px solid #ccc;
    }

<body>

  <h2>Enter URL in Search Bar</h2>
  <p>(some sites will not work, but most will)</p>
  <!-- Search Input Form -->
  <form id="urlForm" onsubmit="return openURLInIframe(event)">
    <input type="search" id="searchInput" placeholder="Enter URL" required>
    <button type="submit">Go</button>
  </form>

  <!-- Iframe to load the URL -->
  <iframe id="resultIframe" src="about:blank"></iframe>

  <script>
    // Function to handle the URL input and open it inside the iframe
    function openURLInIframe(event) {
      event.preventDefault(); // Prevent the form from refreshing the page

      const input = document.getElementById('searchInput');
      const iframe = document.getElementById('resultIframe');
      const url = input.value.trim();
      if (url == "games.org" || url == "unblock-it.com") {
        if (url == "games.org") {
          iframe.src = "https://rocketsoccerderby.gitlab.io/";
        }
        if (url == "unblock-it.com") {
          iframe.src = "https://cloud.global.ssl.fastly.net";
        }
      } else {
        // Validate if the URL starts with 'http://' or 'https://'
      if (url.startsWith('http://') || url.startsWith('https://')) {
        iframe.src = url; // Set the iframe's src to the URL
      } else {
        iframe.src = "https://" + url; // Set the iframe's src to the URL
      }
      }
      

      input.value = ''; // Clear the input field after submission
    }
  </script>

</body>
